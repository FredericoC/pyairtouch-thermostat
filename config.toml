# Configuration for the AirTouch climate control service (climate_service.py).
#
# All temperatures are in degrees Celsius. Unit names must match the names
# configured in the AirTouch console exactly.

[service]
host = "192.168.5.221"        # AirTouch console (IoT VLAN — directed discovery)
poll_interval_seconds = 30    # how often the control loop evaluates temperatures
dry_run = false               # true = log intended commands without sending them
log_file = "climate.log"      # service log file (relative to this config file),
                              # rotated at ~1 MB and tailed by the web dashboard.
                              # Set to "" to log to stdout only.

# Note: when heating, the master and bed 2 never quite reach above 22.2/23°C respectively due to thermostat inaccuracies (maybe?)
[defaults]
target_low = 22.6             # heat when a room drops below this
target_high = 24.8            # cool when a room rises above this
hysteresis = 0.4              # keep conditioning this far past the boundary before
                              # switching a unit off (prevents rapid on/off cycling)
min_mode_dwell_minutes = 60   # minimum time between heat<->cool switches per group
min_power_toggle_minutes = 15 # minimum time between on/off changes per unit
manage_setpoints = true       # also push each unit's setpoint to match the range

[shutdown]
enabled = true                # master switch for the windows below
windows = ["20:00-07:00"]     # local time, "HH:MM-HH:MM"; may cross midnight.
                              # When a window starts every unit is switched
                              # off once; a unit switched on manually during
                              # the window stays on. Add more windows as extra
                              # list entries; for an "away" mode use
                              # ["00:00-24:00"] (all day, every day).
                              # The service reads this file only at startup —
                              # restart it after changes.

[history]
enabled = true                # record per-unit temperature samples over time
path = "history.db"           # SQLite file (relative to this config file)
interval_seconds = 60         # sample rate

# Each group has one master unit that dictates heating/cooling mode for the
# whole group. Mode commands are only ever sent to the master (without turning
# it on); member units are only powered on/off.

[groups.north]
master = "MPR"
members = ["MPR", "Bed 3", "Bed 4"]

[groups.south]
master = "Study"
members = ["Study", "Living", "Master", "Bed 2"]

# Per-room overrides of any [defaults] temperature value

# Jeni prefers her room warmer. HRV will even it out eventually though.
[rooms."Bed 4"]
target_low = 23
target_high = 26
