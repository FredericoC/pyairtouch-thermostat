<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AirTouch temperatures</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    --band: rgba(225, 224, 217, 0.45);
    --heat-wash: rgba(227, 73, 72, 0.55);
    --cool-wash: rgba(42, 120, 214, 0.55);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --band: rgba(44, 44, 42, 0.6);
      --heat-wash: rgba(230, 103, 103, 0.6);
      --cool-wash: rgba(57, 135, 229, 0.6);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page);
    color: var(--text-primary);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 20px clamp(12px, 3vw, 32px) 48px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  .sub { color: var(--text-muted); font-size: 12.5px; margin-top: 2px; }
  #next { font-variant-numeric: tabular-nums; }
  #next.stale { color: #e34948; font-weight: 600; }
  @media (prefers-color-scheme: dark) { #next.stale { color: #e66767; } }

  .filters { display: flex; gap: 6px; align-items: center; margin: 16px 0 14px; flex-wrap: wrap; }
  .filters button {
    font: inherit; font-size: 13px; color: var(--text-secondary);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 12px; cursor: pointer;
  }
  .filters button:hover { color: var(--text-primary); }
  .filters button[aria-pressed="true"] {
    color: var(--text-primary); font-weight: 600; border-color: var(--baseline);
  }
  .filters .spacer { flex: 1; }
  .filters a { color: var(--text-muted); font-size: 12.5px; }

  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px 10px; position: relative;
  }
  .card.heating { border-color: var(--heat-wash); box-shadow: 0 0 0 1px var(--heat-wash); }
  .card.cooling { border-color: var(--cool-wash); box-shadow: 0 0 0 1px var(--cool-wash); }
  .card h2 { font-size: 14px; font-weight: 600; }
  .card .meta { color: var(--text-muted); font-size: 12px; }
  #charts.loading .card { opacity: 0.6; transition: opacity .2s; }

  #grid {
    margin-top: 14px;
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  .unit-head { display: flex; align-items: baseline; gap: 8px; }
  .unit-head .now {
    margin-left: auto; font-size: 20px; font-weight: 600;
  }
  .unit-head .deg { color: var(--text-muted); font-size: 13px; font-weight: 400; }
  .chip { display: inline-flex; align-items: center; gap: 5px; color: var(--text-secondary); font-size: 12px; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  .legend { display: flex; flex-wrap: wrap; gap: 4px 14px; padding: 6px 0 2px; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 12.5px; }
  .legend .key { width: 16px; height: 0; border-top: 2.5px solid; border-radius: 2px; }

  svg { display: block; }
  svg text { fill: var(--text-muted); font: 11px system-ui, sans-serif; font-variant-numeric: tabular-nums; }

  .tooltip {
    position: absolute; pointer-events: none; z-index: 5; display: none;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,.14); padding: 8px 10px; min-width: 130px;
  }
  .tooltip .when { color: var(--text-muted); font-size: 11.5px; margin-bottom: 4px; }
  .tooltip .row { display: flex; align-items: center; gap: 7px; padding: 1.5px 0; font-size: 12.5px; }
  .tooltip .key { width: 12px; height: 0; border-top: 2.5px solid; border-radius: 2px; flex: none; }
  .tooltip .val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .tooltip .name { color: var(--text-secondary); }
  .tooltip .extra { color: var(--text-muted); font-size: 11.5px; margin-top: 3px; }

  details { margin-top: 18px; }
  details.card { margin-top: 0; }
  summary { cursor: pointer; color: var(--text-secondary); font-size: 13px; }
  summary h2 { display: inline; }
  table { border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th, td { text-align: left; padding: 5px 18px 5px 0; border-bottom: 1px solid var(--grid); }
  th { color: var(--text-muted); font-weight: 500; font-size: 12px; }
  td.num { font-variant-numeric: tabular-nums; }

  .log {
    margin-top: 10px; padding: 10px 12px; max-height: 420px; overflow: auto;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--text-secondary); white-space: pre-wrap; overflow-wrap: anywhere;
  }
  .log .warn { color: #c98500; }
  .log .err { color: #e34948; }
  @media (prefers-color-scheme: dark) {
    .log .warn { color: #eda100; }
    .log .err { color: #e66767; }
  }

  .banner {
    display: none; margin: 0 0 12px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface-1);
    color: var(--text-secondary); font-size: 13px;
  }
  .empty { color: var(--text-muted); font-size: 12.5px; padding: 24px 0; text-align: center; }
</style>
</head>
<body>

<h1>AirTouch temperatures</h1>
<div class="sub"><span id="subtitle">Loading…</span><span id="next"></span></div>

<div class="filters" id="filters">
  <span class="spacer"></span>
  <a id="csvLink" href="/api/readings.csv?hours=24">Download CSV</a>
</div>

<div class="banner" id="banner"></div>

<div id="charts">
  <details class="card" id="combined" open>
    <summary><h2>All units</h2></summary>
  </details>
  <div id="grid"></div>
</div>

<details>
  <summary>Data table (latest reading per unit)</summary>
  <table id="table"></table>
</details>

<details id="logSection">
  <summary>Service log</summary>
  <div class="log" id="log">Loading…</div>
</details>

<script>
"use strict";

/* Categorical palette (validated): fixed slot order, one slot per unit,
   assigned by config order and never re-assigned. */
const PALETTE = {
  light: ["#2a78d6", "#1baf7a", "#eda100", "#008300", "#4a3aa7", "#e34948", "#e87ba4"],
  dark:  ["#3987e5", "#199e70", "#c98500", "#008300", "#9085e9", "#e66767", "#d55181"],
};
const RANGES = [
  { label: "6h", hours: 6 },
  { label: "24h", hours: 24 },
  { label: "3d", hours: 72 },
  { label: "7d", hours: 168 },
  { label: "30d", hours: 720 },
];

const darkMedia = matchMedia("(prefers-color-scheme: dark)");
const state = { hours: 24, data: null, error: null };

const $ = (sel) => document.querySelector(sel);
const colors = () => PALETTE[darkMedia.matches ? "dark" : "light"];
const unitColor = (unit) => colors()[state.data.units.indexOf(unit) % colors().length];

function svgEl(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}
function htmlEl(tag, className, text) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  if (text !== undefined) el.textContent = text;
  return el;
}
const fmtTemp = (v) => (v == null ? "–" : v.toFixed(1));

function fmtTime(ts, step) {
  const d = new Date(ts * 1000);
  if (step >= 86400) return d.toLocaleDateString(undefined, { day: "numeric", month: "short" });
  return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}
function fmtFull(ts) {
  return new Date(ts * 1000).toLocaleString(undefined, {
    weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit",
  });
}

function timeTicks(t0, t1) {
  const steps = [900, 1800, 3600, 7200, 10800, 21600, 43200, 86400, 172800, 604800];
  const span = t1 - t0;
  const step = steps.find((s) => span / s <= 7) || 1209600;
  const d = new Date(t0 * 1000);
  d.setSeconds(0, 0);
  if (step >= 86400) d.setHours(0, 0, 0, 0);
  else if (step >= 3600) d.setMinutes(0, 0, 0);
  else d.setMinutes(Math.floor(d.getMinutes() / 15) * 15, 0, 0);
  const ticks = [];
  for (let t = d.getTime() / 1000; t <= t1; t += step) if (t >= t0) ticks.push(t);
  return { ticks, step };
}

function tempTicks(lo, hi) {
  for (const step of [0.5, 1, 2, 5]) {
    const first = Math.ceil(lo / step) * step;
    const n = Math.floor((hi - first) / step) + 1;
    if (n <= 6) {
      return Array.from({ length: n }, (_, i) => +(first + i * step).toFixed(1));
    }
  }
  return [];
}

/* Generic line chart with crosshair + tooltip.
   series: [{name, color, points: [[ts, temp, setpoint, power, activity], ...]}]
   opts: {height, band: [lo, hi] | null, powerStrip: bool, gap: seconds} */
function lineChart(container, series, opts) {
  const width = container.clientWidth - 32; // card padding
  const height = opts.height;
  const m = { top: 10, right: 12, bottom: 22, left: 34 };
  const iw = width - m.left - m.right, ih = height - m.top - m.bottom;
  if (iw <= 40) return;

  const now = Math.floor(Date.now() / 1000);
  const t0 = now - state.hours * 3600, t1 = now;

  let vLo = Infinity, vHi = -Infinity;
  for (const s of series)
    for (const p of s.points)
      if (p[1] != null) { vLo = Math.min(vLo, p[1]); vHi = Math.max(vHi, p[1]); }
  if (opts.band) { vLo = Math.min(vLo, opts.band[0]); vHi = Math.max(vHi, opts.band[1]); }
  if (!isFinite(vLo)) { container.appendChild(htmlEl("div", "empty", "No data yet in this range")); return; }
  vLo = Math.floor((vLo - 0.3) * 2) / 2;
  vHi = Math.ceil((vHi + 0.3) * 2) / 2;

  const x = (t) => m.left + ((t - t0) / (t1 - t0)) * iw;
  const y = (v) => m.top + (1 - (v - vLo) / (vHi - vLo)) * ih;

  const svg = svgEl("svg", { width, height, role: "img" });

  // Target-range band (neutral wash, behind everything)
  if (opts.band) {
    svg.appendChild(svgEl("rect", {
      x: m.left, y: y(opts.band[1]),
      width: iw, height: Math.max(0, y(opts.band[0]) - y(opts.band[1])),
      fill: "var(--band)",
    }));
  }

  // Gridlines + y ticks (hairline, recessive)
  for (const v of tempTicks(vLo, vHi)) {
    svg.appendChild(svgEl("line", {
      x1: m.left, x2: m.left + iw, y1: y(v), y2: y(v),
      stroke: "var(--grid)", "stroke-width": 1,
    }));
    const label = svgEl("text", { x: m.left - 6, y: y(v) + 3.5, "text-anchor": "end" });
    label.textContent = v.toFixed(1);
    svg.appendChild(label);
  }

  // x ticks
  const { ticks, step } = timeTicks(t0, t1);
  for (const t of ticks) {
    svg.appendChild(svgEl("line", {
      x1: x(t), x2: x(t), y1: m.top + ih, y2: m.top + ih + 4,
      stroke: "var(--baseline)", "stroke-width": 1,
    }));
    const label = svgEl("text", { x: x(t), y: m.top + ih + 15, "text-anchor": "middle" });
    label.textContent = fmtTime(t, step);
    svg.appendChild(label);
  }

  // baseline
  svg.appendChild(svgEl("line", {
    x1: m.left, x2: m.left + iw, y1: m.top + ih, y2: m.top + ih,
    stroke: "var(--baseline)", "stroke-width": 1,
  }));

  // Power strip (single-unit charts): washes where the unit ran
  if (opts.powerStrip && series.length === 1) {
    const pts = series[0].points;
    let segStart = null, segKind = null;
    const flush = (tEnd) => {
      if (segStart == null) return;
      const wash = segKind === "heating" ? "var(--heat-wash)"
                 : segKind === "cooling" ? "var(--cool-wash)" : "var(--baseline)";
      svg.appendChild(svgEl("rect", {
        x: x(segStart), y: m.top + ih - 3,
        width: Math.max(1.5, x(tEnd) - x(segStart)), height: 3,
        rx: 1.5, fill: wash,
      }));
      segStart = null;
    };
    for (let i = 0; i < pts.length; i++) {
      const [t, , , power, activity] = pts[i];
      const kind = power ? (activity || "on") : null;
      const prevT = i > 0 ? pts[i - 1][0] : t;
      if (kind !== segKind || t - prevT > opts.gap) { flush(prevT); if (kind) { segStart = t; segKind = kind; } }
      else if (kind && segStart == null) { segStart = t; }
      if (kind) segKind = kind;
    }
    if (segStart != null) flush(pts[pts.length - 1][0]);
  }

  // Series lines (2px, round joins, break across gaps/nulls)
  for (const s of series) {
    let d = "", pen = false, prevT = null;
    for (const p of s.points) {
      if (p[1] == null || (prevT != null && p[0] - prevT > opts.gap)) pen = false;
      if (p[1] != null) {
        d += `${pen ? "L" : "M"}${x(p[0]).toFixed(1)},${y(p[1]).toFixed(1)}`;
        pen = true;
      }
      prevT = p[0];
    }
    if (d) svg.appendChild(svgEl("path", {
      d, fill: "none", stroke: s.color, "stroke-width": 2,
      "stroke-linejoin": "round", "stroke-linecap": "round",
    }));
  }

  // Crosshair + tooltip
  const cross = svgEl("line", {
    y1: m.top, y2: m.top + ih, stroke: "var(--baseline)", "stroke-width": 1, visibility: "hidden",
  });
  svg.appendChild(cross);
  const dots = series.map((s) => {
    const dot = svgEl("circle", {
      r: 4, fill: s.color, stroke: "var(--surface-1)", "stroke-width": 2, visibility: "hidden",
    });
    svg.appendChild(dot);
    return dot;
  });

  const tooltip = htmlEl("div", "tooltip");
  container.appendChild(tooltip);

  const times = [...new Set(series.flatMap((s) => s.points.map((p) => p[0])))].sort((a, b) => a - b);
  const byTime = series.map((s) => new Map(s.points.map((p) => [p[0], p])));

  const hover = svgEl("rect", {
    x: m.left, y: m.top, width: iw, height: ih, fill: "transparent",
  });
  svg.appendChild(hover);

  function showAt(clientX) {
    if (!times.length) return;
    const rect = svg.getBoundingClientRect();
    const t = t0 + ((clientX - rect.left - m.left) / iw) * (t1 - t0);
    let nearest = times[0];
    for (const ti of times) if (Math.abs(ti - t) < Math.abs(nearest - t)) nearest = ti;

    cross.setAttribute("x1", x(nearest));
    cross.setAttribute("x2", x(nearest));
    cross.setAttribute("visibility", "visible");

    tooltip.textContent = "";
    tooltip.appendChild(htmlEl("div", "when", fmtFull(nearest)));

    const rows = [];
    series.forEach((s, i) => {
      const p = byTime[i].get(nearest);
      if (p && p[1] != null) {
        dots[i].setAttribute("cx", x(nearest));
        dots[i].setAttribute("cy", y(p[1]));
        dots[i].setAttribute("visibility", "visible");
        rows.push({ s, p });
      } else {
        dots[i].setAttribute("visibility", "hidden");
      }
    });
    rows.sort((a, b) => b.p[1] - a.p[1]);
    for (const { s, p } of rows) {
      const row = htmlEl("div", "row");
      const key = htmlEl("span", "key");
      key.style.borderTopColor = s.color;
      row.appendChild(key);
      row.appendChild(htmlEl("span", "val", `${p[1].toFixed(1)}°`));
      row.appendChild(htmlEl("span", "name", s.name));
      tooltip.appendChild(row);
    }
    if (series.length === 1 && rows.length) {
      const p = rows[0].p;
      const bits = [];
      if (p[3]) bits.push(p[4] || "on");
      if (p[3] && p[2] != null) bits.push(`setpoint ${p[2].toFixed(1)}°`);
      if (!p[3]) bits.push("off");
      tooltip.appendChild(htmlEl("div", "extra", bits.join(" · ")));
    }

    tooltip.style.display = "block";
    const cardRect = container.getBoundingClientRect();
    const px = x(nearest) + 14;
    const flip = px + tooltip.offsetWidth + 20 > cardRect.width;
    tooltip.style.left = `${flip ? x(nearest) - tooltip.offsetWidth - 12 : px}px`;
    tooltip.style.top = "18px";
  }
  function hide() {
    cross.setAttribute("visibility", "hidden");
    dots.forEach((d) => d.setAttribute("visibility", "hidden"));
    tooltip.style.display = "none";
  }
  hover.addEventListener("pointermove", (e) => showAt(e.clientX));
  hover.addEventListener("pointerleave", hide);

  container.appendChild(svg);
}

function latest(points) {
  for (let i = points.length - 1; i >= 0; i--) if (points[i][1] != null) return points[i];
  return null;
}

function renderCombined() {
  const card = $("#combined");
  card.textContent = "";
  const summary = htmlEl("summary");
  summary.appendChild(htmlEl("h2", null, "All units"));
  card.appendChild(summary);
  if (!card.open) return; // collapsed: a hidden chart has no width to draw in

  const legend = htmlEl("div", "legend");
  for (const unit of state.data.units) {
    const item = htmlEl("span", "item");
    const key = htmlEl("span", "key");
    key.style.borderTopColor = unitColor(unit);
    item.appendChild(key);
    item.appendChild(htmlEl("span", null, unit));
    legend.appendChild(item);
  }
  card.appendChild(legend);

  lineChart(card, state.data.units.map((unit) => ({
    name: unit, color: unitColor(unit), points: state.data.series[unit],
  })), { height: 300, band: null, powerStrip: false, gap: gapSeconds() });
}

function renderGrid() {
  const grid = $("#grid");
  grid.textContent = "";
  for (const unit of state.data.units) {
    const card = htmlEl("section", "card");
    const head = htmlEl("div", "unit-head");
    head.appendChild(htmlEl("h2", null, unit));

    const isMaster = Object.values(state.data.groups).some((g) => g.master === unit);
    if (isMaster) head.appendChild(htmlEl("span", "meta", "master"));

    const last = latest(state.data.series[unit]);
    if (last && last[3] && (last[4] === "heating" || last[4] === "cooling"))
      card.classList.add(last[4]);
    if (last && last[3]) {
      const chip = htmlEl("span", "chip");
      const dot = htmlEl("span", "dot");
      dot.style.background = last[4] === "heating" ? "var(--heat-wash)"
        : last[4] === "cooling" ? "var(--cool-wash)" : "var(--baseline)";
      chip.appendChild(dot);
      chip.appendChild(document.createTextNode(last[4] || "on"));
      head.appendChild(chip);
    }

    const now = htmlEl("span", "now", last ? fmtTemp(last[1]) : "–");
    now.appendChild(htmlEl("span", "deg", " °C"));
    head.appendChild(now);
    card.appendChild(head);

    const range = state.data.ranges[unit];
    card.appendChild(htmlEl("div", "meta", `target ${range[0].toFixed(1)}–${range[1].toFixed(1)} °C`));
    grid.appendChild(card);

    lineChart(card, [{ name: unit, color: unitColor(unit), points: state.data.series[unit] }],
      { height: 150, band: range, powerStrip: true, gap: gapSeconds() });
  }
}

function renderTable() {
  const table = $("#table");
  table.textContent = "";
  const thead = htmlEl("tr");
  for (const h of ["Unit", "Temperature", "Setpoint", "Power", "Activity", "Sampled"])
    thead.appendChild(htmlEl("th", null, h));
  table.appendChild(thead);
  for (const unit of state.data.units) {
    const p = latest(state.data.series[unit]);
    const tr = htmlEl("tr");
    tr.appendChild(htmlEl("td", null, unit));
    tr.appendChild(htmlEl("td", "num", p ? `${fmtTemp(p[1])} °C` : "–"));
    tr.appendChild(htmlEl("td", "num", p && p[2] != null ? `${p[2].toFixed(1)} °C` : "–"));
    tr.appendChild(htmlEl("td", null, p ? (p[3] ? "on" : "off") : "–"));
    tr.appendChild(htmlEl("td", null, (p && p[4]) || "–"));
    tr.appendChild(htmlEl("td", null, p ? fmtFull(p[0]) : "–"));
    table.appendChild(tr);
  }
}

function gapSeconds() {
  return Math.max(600, 3 * (state.data.bucket || state.data.sample_interval));
}

function render() {
  if (!state.data) return;
  renderCombined();
  renderGrid();
  renderTable();
  $("#subtitle").textContent =
    `Last ${RANGES.find((r) => r.hours === state.hours)?.label ?? state.hours + "h"}` +
    ` · sampled every ${Math.round(state.data.sample_interval)}s`;
  tickCountdown();
}

/* Countdown to the next history sample. The recorder writes on the first poll
   tick at least sample_interval after the previous sample, so the newest ts in
   the DB predicts the next write to within one poll interval. */
let autoFetchedFor = null;
function tickCountdown() {
  const el = $("#next");
  const d = state.data;
  if (!d || d.latest_ts == null) { el.textContent = ""; return; }
  const now = Date.now() / 1000;
  const due = d.latest_ts + d.sample_interval;
  const late = now - due;
  const grace = (d.poll_interval || 30) + 5;
  el.classList.toggle("stale", late > grace);
  if (late < 0) {
    el.textContent = ` · next update in ${Math.ceil(-late)}s`;
  } else if (late <= grace) {
    el.textContent = " · updating…";
  } else {
    const ago = now - d.latest_ts;
    el.textContent = ` · last sample ${ago >= 90 ? Math.round(ago / 60) + "m" : Math.round(ago) + "s"} ago`;
  }
  // Refetch shortly after a sample is due so charts pick it up without waiting
  // for the 60s interval; once per due time, the interval remains the fallback.
  if (late >= 3 && late <= grace && autoFetchedFor !== due) {
    autoFetchedFor = due;
    refresh();
  }
}
setInterval(tickCountdown, 1000);

async function refresh() {
  $("#charts").classList.add("loading");
  try {
    const res = await fetch(`/api/data?hours=${state.hours}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    state.data = await res.json();
    state.error = null;
    $("#banner").style.display = "none";
    render();
  } catch (err) {
    state.error = err;
    const banner = $("#banner");
    banner.textContent = `Could not load data (${err.message}). Retrying…`;
    banner.style.display = "block";
  } finally {
    $("#charts").classList.remove("loading");
  }
}

/* Service log panel: fetched when opened, kept fresh while open. Traceback
   continuation lines carry no level marker, so an ERROR line highlights
   everything until the next timestamped line. */
const logSection = $("#logSection");
const LOG_LINE = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} (\w+)/;
async function refreshLog() {
  if (!logSection.open) return;
  const el = $("#log");
  try {
    const res = await fetch("/api/log?lines=300");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    el.textContent = "";
    let carry = null;
    for (const line of text.split("\n")) {
      const m = line.match(LOG_LINE);
      if (m) carry = m[1] === "ERROR" || m[1] === "CRITICAL" ? "err"
                   : m[1] === "WARNING" ? "warn" : null;
      el.appendChild(htmlEl("div", carry, line || " "));
    }
    if (atBottom) el.scrollTop = el.scrollHeight;
  } catch (err) {
    el.textContent = `Could not load log (${err.message}).`;
  }
}
logSection.addEventListener("toggle", refreshLog);
setInterval(refreshLog, 30_000);

/* Combined-chart collapse state, remembered per browser. */
const combinedCard = $("#combined");
combinedCard.open = localStorage.getItem("combinedOpen") !== "0";
combinedCard.addEventListener("toggle", () => {
  localStorage.setItem("combinedOpen", combinedCard.open ? "1" : "0");
  if (state.data) renderCombined();
});

function buildFilters() {
  const filters = $("#filters");
  for (const r of [...RANGES].reverse()) {
    const btn = htmlEl("button", null, r.label);
    btn.setAttribute("aria-pressed", String(r.hours === state.hours));
    btn.addEventListener("click", () => {
      state.hours = r.hours;
      for (const b of filters.querySelectorAll("button"))
        b.setAttribute("aria-pressed", String(b === btn));
      $("#csvLink").href = `/api/readings.csv?hours=${r.hours}`;
      refresh();
    });
    filters.prepend(btn);
  }
}

let resizeTimer;
addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 150);
});
darkMedia.addEventListener("change", render);

buildFilters();
refresh();
setInterval(refresh, 60_000);
</script>
</body>
</html>
